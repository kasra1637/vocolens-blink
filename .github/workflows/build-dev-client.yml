name: Build Dev Client (one-time setup)

# This workflow builds a custom development client for your phone.
# Run it ONCE from GitHub Actions → "Run workflow" button.
# After installing the resulting APK, you'll receive OTA updates
# automatically on every push — no local dev setup needed.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  build:
    name: Build dev client (${{ github.event.inputs.platform }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-fund --no-audit

      - uses: expo/expo-github-action@v8
        with:
          eas-version: 19.0.1
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build development client
        run: |
          if [ "${{ github.event.inputs.platform }}" = "all" ]; then
            eas build --profile development --platform all --non-interactive
          else
            eas build --profile development --platform ${{ github.event.inputs.platform }} --non-interactive
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
