name: PR Preview (Expo Go)

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Publish preview update
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-fund --no-audit

      - uses: expo/expo-github-action@v8
        with:
          eas-version: 19.0.1
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS Update for PR
        id: update
        run: |
          eas update \
            --branch pr-${{ github.event.pull_request.number }} \
            --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const sha = context.sha.slice(0, 7);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const branch = `pr-${prNumber}`;
            const account = '${{ github.repository_owner }}';
            const easUrl = `https://expo.dev/accounts/${account}/projects/vocolens/updates`;

            const body = [
              `## 📱 Expo Go Preview`,
              ``,
              `Your changes have been published as an OTA update. To preview:`,
              ``,
              `1. Open **Expo Go** on your phone`,
              `2. Make sure you have the development build installed (or use Expo Go with the \`vocolens\` project)`,
              `3. The update on branch \`${branch}\` will load automatically`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Commit** | \`${sha}\` |`,
              `| **Update branch** | \`${branch}\` |`,
              `| **EAS Updates** | [View on dashboard](${easUrl}) |`,
              `| **CI run** | [View logs](${runUrl}) |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const prev = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Expo Go Preview')
            );
            if (prev) {
              await github.rest.issues.updateComment({
                comment_id: prev.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
